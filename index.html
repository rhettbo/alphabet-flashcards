<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#18392b" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/ABC favicon .jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Alphabet Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero__copy">
          <p class="eyebrow">Alphabet Game</p>
          <h1>ABC Fun</h1>
        </div>

        <div class="hero__status">
          <div class="status-card">
            <span class="status-card__label">Status</span>
            <span id="progressText" class="status-card__value">Practice Mode: Letter Name</span>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel--controls" aria-label="Game controls">
          <div class="control-block">
            <span class="control-block__label">Main Mode</span>
            <div class="segmented" id="mainModeControls">
              <button class="segment is-active" data-main-mode="practice" type="button">Practice Mode</button>
              <button class="segment" data-main-mode="quiz" type="button">Quiz Mode</button>
            </div>
          </div>

          <div class="control-block" id="practiceControls">
            <span class="control-block__label">Practice Audio</span>
            <div class="segmented">
              <button class="segment is-active" data-practice-mode="name" type="button">Letter Name</button>
              <button class="segment segment--icon" data-practice-mode="sound" type="button">
                <img src="icons/ear.svg" alt="" aria-hidden="true">
                <span>Letter Sound</span>
              </button>
            </div>
          </div>

          <div class="control-block hidden" id="quizControls">
            <span class="control-block__label">Quiz Controls</span>
            <div class="prompt-card__actions">
              <button id="playPromptBtn" class="action-button action-button--primary" type="button">Play Sound</button>
              <button id="resetQuizBtn" class="action-button action-button--secondary hidden" type="button">Restart Quiz</button>
            </div>
          </div>

          <div class="control-block control-block--wide hidden" id="quizSetup">
            <span class="control-block__label">Choose Quiz Letters</span>
            <div class="quiz-picker">
              <div class="drop-zone" id="selectedZone" data-zone="selected">
                <div class="drop-zone__header">
                  <span>Quiz Letters</span>
                  <div class="drop-zone__actions">
                    <span id="selectedCount" class="drop-zone__count">26</span>
                  </div>
                </div>
                <div class="drop-zone__shortcuts">
                  <button id="selectAllLettersBtn" class="mini-action-button" type="button">All 26</button>
                  <button id="selectTopRowBtn" class="mini-action-button" type="button">Top Row</button>
                  <button id="selectBottomRowBtn" class="mini-action-button" type="button">Bottom Row</button>
                </div>
                <div id="selectedLetters" class="mini-letter-grid" aria-label="Selected quiz letters"></div>
              </div>
              <div class="drop-zone" id="availableZone" data-zone="available">
                <div class="drop-zone__header">
                  <span>Other Letters</span>
                </div>
                <div id="availableLetters" class="mini-letter-grid" aria-label="Available letters"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel panel--board">
          <div id="letterGrid" class="letter-grid" role="grid" aria-label="Alphabet tiles"></div>
        </section>
      </main>
    </div>

    <div id="loadingOverlay" class="overlay" aria-hidden="false">
      <div class="overlay__card">
        <p>Loading audio files…</p>
        <div class="bar"><div id="loadFill" class="bar__fill" style="width: 0%"></div></div>
      </div>
    </div>

    <div id="scoreModal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="scoreTitle">
      <div class="modal__sheet">
        <p class="eyebrow">Round Complete</p>
        <h2 id="scoreTitle">Nice work</h2>
        <p id="scoreLine" class="score-line">You got 0 out of 26 on the first try.</p>
        <div class="modal__actions">
          <button id="playAgainBtn" class="action-button action-button--primary" type="button">Play Again</button>
          <button id="closeModalBtn" class="action-button action-button--secondary" type="button">Close</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
